services:
  postgres-h3:
    build: .
    container_name: postgres-h3
    environment:
      POSTGRES_DB: postgres-h3-db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-h3-data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: unless-stopped

volumes:
  postgres-h3-data: