openapi: "3.0.3"
info:
  title: Commute Tracker API
  version: "1.0.0"
paths:
  /commutes/ingest:
    post:
      summary: Ingest a raw commute location point
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, latitude, longitude, timestamp]
              properties:
                user_id:
                  type: string
                  description: User identifier (non-empty string)
                latitude:
                  type: number
                  minimum: -90
                  maximum: 90
                longitude:
                  type: number
                  minimum: -180
                  maximum: 180
                timestamp:
                  type: string
                  format: date-time
                  description: ISO 8601 timestamp
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /commutes/intersections:
    post:
      summary: Find intersecting H3 cells between two users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id_a, user_id_b]
              properties:
                user_id_a:
                  type: string
                user_id_b:
                  type: string
      responses:
        "200":
          description: Intersection result
          content:
            application/json:
              schema:
                type: object
                properties:
                  shared_cells:
                    type: array
                    items:
                      type: integer
        "404":
          description: User not found
